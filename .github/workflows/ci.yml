name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Lint backend
        run: |
          cd backend
          ruff check app
      - name: Test backend
        run: |
          cd backend
          PYTHONPATH=. pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        run: |
          cd frontend
          npm install
      - name: Lint frontend
        run: |
          cd frontend
          npm run lint
      - name: Build frontend
        run: |
          cd frontend
          npm run build

  demo-smoke:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run API smoke and demo seed checks
        run: |
          cd backend
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          APP_PID=$!
          sleep 4
          curl -f http://127.0.0.1:8000/healthz
          curl -f -X POST http://127.0.0.1:8000/api/v1/workflows/templates/seed-demo
          kill $APP_PID
